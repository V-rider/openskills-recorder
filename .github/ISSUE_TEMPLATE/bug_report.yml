name: Bug report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please include enough detail to reproduce locally.

  - type: input
    id: version
    attributes:
      label: OpenSkills Recorder version
      placeholder: "0.1.0 or commit SHA"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "node -v output"
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime mode
      options:
        - Web only (pnpm dev, browser at :3000)
        - Electron desktop shell
        - Production build (next start)
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Recording scope (if applicable)
      options:
        - session
        - tab
        - N/A
    validations:
      required: false

  - type: input
    id: url
    attributes:
      label: Target URL (if applicable)
      placeholder: "https://example.com"
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start recording with startUrl ...
        2. Click ...
        3. Stop & synthesize
        4. Run replay with inputs ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / artifacts
      description: Paste terminal output or paths under ~/.openskills/logs/
      placeholder: |
        Replay log path, synthesis warnings, or console errors
    validations:
      required: false
