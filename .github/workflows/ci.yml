name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build:packages

      - name: Push database schema
        run: pnpm db:push
        env:
          DATABASE_URL: file:./openskills-data/ci.db

      - name: Unit tests
        run: pnpm test

      - name: Build web
        run: pnpm --filter @openskills/web build
        env:
          DATABASE_URL: file:./openskills-data/ci.db

      - name: Install Playwright
        run: npx playwright install chromium

      - name: E2E tests
        run: pnpm test:e2e
        env:
          DATABASE_URL: file:./openskills-data/e2e.db
          CI: true
